version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-risk_guardrail}
      POSTGRES_USER: ${POSTGRES_USER:-risk_guardrail}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-risk_guardrail}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-risk_guardrail} -d ${POSTGRES_DB:-risk_guardrail}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql://risk_guardrail:risk_guardrail@postgres:5432/risk_guardrail
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
